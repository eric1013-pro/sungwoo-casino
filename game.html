<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>트릭이 키우기 (VIP Edition)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700;900&family=Orbitron:wght@900&display=swap');

        body {
            margin: 0; padding: 0;
            background-color: #050508;
            color: white;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 👑 고급스러운 인트로 화면 */
        #introScreen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a0b2e 0%, #050508 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .intro-title {
            font-family: 'Orbitron', 'Noto Sans KR', sans-serif;
            font-size: 4rem;
            color: #ffd700;
            text-shadow: 0 0 10px #ffd700, 0 0 30px #ff8c00, 0 0 60px #ff0080;
            margin-bottom: 50px;
            text-align: center;
            animation: floatTitle 3s ease-in-out infinite;
        }
        @keyframes floatTitle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .btn-enter {
            background: linear-gradient(45deg, #ff8c00, #ff0080);
            color: white;
            font-size: 1.5rem;
            font-weight: 900;
            padding: 15px 60px;
            border: 2px solid #ffd700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            transition: 0.3s;
            font-family: 'Noto Sans KR', sans-serif;
        }
        .btn-enter:active { transform: scale(0.95); box-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }

        /* UI 레이어 */
        #ui-layer { position: absolute; top: 20px; left: 20px; pointer-events: none; z-index: 10; }
        #scoreDisplay { font-size: 26px; font-weight: 900; color: #ffd700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.8); }
        #healthDisplay { font-size: 22px; color: #ff0055; margin-top: 10px; text-shadow: 0 0 10px rgba(255, 0, 85, 0.8); }
        #ammoDisplay { font-size: 22px; color: #00f3ff; font-weight: bold; margin-top: 10px; text-shadow: 0 0 10px rgba(0, 243, 255, 0.8); }

        /* ⚠️ 보스 경고 문구 */
        #bossWarning {
            position: absolute;
            top: 20%; left: 50%;
            transform: translateX(-50%);
            font-size: 3rem;
            font-weight: 900;
            color: #ff0000;
            text-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000;
            display: none;
            z-index: 20;
            animation: blink 0.5s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* 모바일 트윈 스틱 (왼쪽: 이동, 오른쪽: 공격) */
        .joystick-zone {
            position: absolute; bottom: 40px; width: 130px; height: 130px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%; z-index: 15;
        }
        #joystick-left { left: 40px; }
        #joystick-right { right: 40px; border-color: rgba(255, 0, 85, 0.3); }
        .joystick-knob {
            position: absolute; top: 50%; left: 50%; width: 50px; height: 50px;
            border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none;
        }
        #knob-left { background: rgba(0, 243, 255, 0.6); box-shadow: 0 0 15px #00f3ff; }
        #knob-right { background: rgba(255, 0, 85, 0.6); box-shadow: 0 0 15px #ff0055; }

        /* 팝업 모달 */
        .modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 30;
        }
        .modal-content {
            background: #111; padding: 40px; border-radius: 20px; border: 2px solid #ffd700;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.3); text-align: center;
        }
        .modal h1 { color: #ffd700; font-size: 2rem; margin-top: 0; text-shadow: 0 0 15px #ffd700; }
        
        .card-container { display: flex; gap: 20px; margin-top: 30px; flex-wrap: wrap; justify-content: center; }
        .upgrade-card {
            background: #1a0b2e; border: 2px solid #00f3ff; border-radius: 15px; padding: 20px;
            width: 180px; cursor: pointer; transition: 0.3s; box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }
        .upgrade-card:hover { transform: translateY(-10px); background: #00f3ff; color: #000; box-shadow: 0 0 30px #00f3ff; }
        .card-title { font-size: 20px; font-weight: 900; margin-bottom: 10px; }
        .card-desc { font-size: 14px; color: #ddd; }
        .upgrade-card:hover .card-desc { color: #222; }

        canvas { display: block; }
        
        @media (min-width: 800px) {
            #joystick-left, #joystick-right { display: none; } /* PC에선 조이스틱 숨김 */
        }
    </style>
</head>
<body>

    <!-- 👑 인트로 화면 -->
    <div id="introScreen">
        <div class="intro-title">트릭이 키우기</div>
        <button class="btn-enter" onclick="startGame()">입장하기</button>
    </div>

    <!-- UI 요소 -->
    <div id="ui-layer">
        <div id="scoreDisplay">처치: 0</div>
        <div id="healthDisplay">HP: ❤️❤️❤️</div>
        <div id="ammoDisplay">탄창: 10 / 10</div>
    </div>
    
    <div id="bossWarning">⚠️ 보스몹 등장 ⚠️</div>

    <!-- 모바일 전용 트윈 조이스틱 -->
    <div id="joystick-left" class="joystick-zone"><div id="knob-left" class="joystick-knob"></div></div>
    <div id="joystick-right" class="joystick-zone"><div id="knob-right" class="joystick-knob"></div></div>

    <!-- 업그레이드 모달 -->
    <div id="upgradeModal" class="modal">
        <div class="modal-content">
            <h1>LEVEL UP!</h1>
            <p style="color: #ccc;">적들이 더욱 강해집니다. 능력을 선택하세요.</p>
            <div class="card-container" id="cardContainer"></div>
        </div>
    </div>

    <!-- 게임 오버 모달 -->
    <div id="gameOverModal" class="modal">
        <div class="modal-content" style="border-color: #ff0055; box-shadow: 0 0 40px rgba(255, 0, 85, 0.4);">
            <h1 style="color: #ff0055; text-shadow: 0 0 15px #ff0055;">TRICKY DIED</h1>
            <p id="finalScore" style="font-size: 24px;">최종 처치 수: 0</p>
            <button class="btn-enter" onclick="location.reload()" style="margin-top:20px; font-size: 1.2rem;">다시 도전</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- 전역 변수 설정 ---
        let score = 0;
        let lastUpgradeScore = 0;
        let lastBossScore = 0;
        let difficultyMultiplier = 1.0; // 난이도 계수
        let gameActive = false;
        let isPaused = false;
        let animationId;

        // --- 그리기 헬퍼 함수 ---
        function drawPolygon(ctx, x, y, radius, sides, color, rotation) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rotation);
            ctx.beginPath();
            for (let i = 0; i < sides; i++) {
                const angle = (i * 2 * Math.PI) / sides;
                ctx.lineTo(radius * Math.cos(angle), radius * Math.sin(angle));
            }
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = color;
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#fff';
            ctx.stroke();
            ctx.restore();
        }

        // --- 클래스 ---
        class Player {
            constructor(x, y) {
                this.x = x; this.y = y; this.radius = 20;
                this.speed = 5; this.health = 3; this.maxHealth = 3;
                this.damage = 1; this.maxAmmo = 10; this.currentAmmo = 10;
                this.fireDelay = 250; this.lastShotTime = 0; this.isReloading = false;
            }
            draw() {
                // 고퀄리티 트릭이 디자인 (빛나는 코어 + 회전하는 아우라)
                const time = Date.now() * 0.002;
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // 회전하는 아우라
                ctx.rotate(time);
                ctx.beginPath();
                ctx.arc(0, 0, this.radius + 8, 0, Math.PI * 1.5);
                ctx.strokeStyle = '#00f3ff';
                ctx.lineWidth = 3;
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#00f3ff';
                ctx.stroke();
                
                // 빛나는 코어
                ctx.rotate(-time); // 코어는 고정
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#1a0b2e';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(0, 0, this.radius - 5, 0, Math.PI * 2);
                ctx.fillStyle = '#ffd700';
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#ffd700';
                ctx.fill();
                
                ctx.restore();
            }
        }

        class Projectile {
            constructor(x, y, velocity, damage) {
                this.x = x; this.y = y; this.radius = 8;
                this.velocity = velocity; this.damage = damage;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ff0080';
                ctx.fill();
            }
            update() { this.draw(); this.x += this.velocity.x; this.y += this.velocity.y; }
        }

        class Enemy {
            constructor(x, y, radius, color, velocity, health, type, isBoss = false) {
                this.x = x; this.y = y; this.radius = radius; this.color = color;
                this.velocity = velocity; this.health = health; this.maxHealth = health;
                this.type = type; this.isBoss = isBoss; this.rotation = 0;
            }
            draw() {
                this.rotation += 0.02; // 빙글빙글 회전
                if(this.isBoss) {
                    drawPolygon(ctx, this.x, this.y, this.radius, 8, this.color, -this.rotation); // 보스는 8각형
                } else if(this.type === 'fast') {
                    drawPolygon(ctx, this.x, this.y, this.radius, 3, this.color, this.rotation); // 스피드몹은 삼각형
                } else if(this.type === 'tank') {
                    drawPolygon(ctx, this.x, this.y, this.radius, 6, this.color, this.rotation); // 탱커는 육각형
                } else {
                    drawPolygon(ctx, this.x, this.y, this.radius, 4, this.color, this.rotation); // 일반은 사각형
                }
                
                // 체력바
                const barW = this.radius * 2; const barH = this.isBoss ? 10 : 6;
                const hpRatio = this.health / this.maxHealth;
                ctx.fillStyle = '#333';
                ctx.fillRect(this.x - this.radius, this.y - this.radius - 20, barW, barH);
                ctx.fillStyle = hpRatio > 0.4 ? '#2ecc71' : '#e74c3c';
                ctx.fillRect(this.x - this.radius, this.y - this.radius - 20, barW * hpRatio, barH);
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
                ctx.strokeRect(this.x - this.radius, this.y - this.radius - 20, barW, barH);
            }
            update() { this.draw(); this.x += this.velocity.x; this.y += this.velocity.y; }
        }

        const player = new Player(canvas.width / 2, canvas.height / 2);
        const projectiles = [];
        const enemies = [];

        // --- 무기 시스템 ---
        function updateAmmoDisplay() {
            const display = document.getElementById('ammoDisplay');
            if (player.isReloading) {
                display.innerText = `장전 중...`; display.style.color = "#ff8c00";
            } else {
                display.innerText = `탄창: ${player.currentAmmo} / ${player.maxAmmo}`;
                display.style.color = player.currentAmmo === 0 ? "#ff0055" : "#00f3ff";
            }
        }

        function reload() {
            if (player.isReloading || player.currentAmmo === player.maxAmmo) return;
            player.isReloading = true; updateAmmoDisplay();
            setTimeout(() => { player.currentAmmo = player.maxAmmo; player.isReloading = false; updateAmmoDisplay(); }, 1200);
        }

        function shoot(angle) {
            if (!gameActive || isPaused) return;
            const now = Date.now();
            if (now - player.lastShotTime < player.fireDelay) return;
            if (player.currentAmmo <= 0) { reload(); return; }

            const velocity = { x: Math.cos(angle) * 18, y: Math.sin(angle) * 18 };
            projectiles.push(new Projectile(player.x, player.y, velocity, player.damage));
            
            player.currentAmmo--; player.lastShotTime = now; updateAmmoDisplay();
        }

        // --- 업그레이드 & 난이도 시스템 ---
        const upgrades = [
            { name: '🔥 파워 업', desc: '총알 데미지 강력하게 1 상승', apply: () => player.damage += 1 },
            { name: '📦 탄창 확장', desc: '최대 탄창 수 +5', apply: () => { player.maxAmmo += 5; player.currentAmmo = player.maxAmmo; } },
            { name: '⚡ 연사 속도', desc: '총알이 더 빨리 나갑니다', apply: () => player.fireDelay = Math.max(50, player.fireDelay - 40) },
            { name: '👟 부스터 온', desc: '트릭이 이동 속도 증가', apply: () => player.speed += 1.5 },
            { name: '💖 전면 수리', desc: '체력을 끝까지 회복합니다', apply: () => { player.health = player.maxHealth; updateHealth(); } }
        ];

        function triggerUpgrade() {
            isPaused = true;
            document.getElementById('upgradeModal').style.display = 'flex';
            const container = document.getElementById('cardContainer');
            container.innerHTML = '';

            const shuffled = upgrades.sort(() => 0.5 - Math.random()).slice(0, 2);
            shuffled.forEach(card => {
                const div = document.createElement('div');
                div.className = 'upgrade-card';
                div.innerHTML = `<div class="card-title">${card.name}</div><div class="card-desc">${card.desc}</div>`;
                div.onclick = () => {
                    card.apply();
                    updateAmmoDisplay();
                    difficultyMultiplier += 0.2; // 🔺 난이도 상승 (몹 피통, 속도 증가)
                    document.getElementById('upgradeModal').style.display = 'none';
                    isPaused = false;
                };
                container.appendChild(div);
            });
        }

        // --- 보스 시스템 ---
        function spawnBoss() {
            const warning = document.getElementById('bossWarning');
            warning.style.display = 'block';
            setTimeout(() => { warning.style.display = 'none'; }, 3000);

            const hp = 50 * difficultyMultiplier; // 보스 체력 어마어마함
            const radius = 60;
            const x = Math.random() < 0.5 ? 0 - radius : canvas.width + radius;
            const y = Math.random() * canvas.height;
            const angle = Math.atan2(player.y - y, player.x - x);
            const velocity = { x: Math.cos(angle) * 1.5, y: Math.sin(angle) * 1.5 }; // 보스는 느림

            enemies.push(new Enemy(x, y, radius, '#ff0000', velocity, hp, 'boss', true));
        }

        // --- 적 생성기 ---
        function spawnEnemies() {
            setInterval(() => {
                if (!gameActive || isPaused) return;

                const rand = Math.random();
                let r, c, vMult, hp, type;
                
                if (rand < 0.5) { r=20; c='#e91e63'; vMult=2.5; hp=2; type='normal'; }
                else if (rand < 0.8) { r=12; c='#00ff88'; vMult=5; hp=1; type='fast'; }
                else { r=35; c='#9c27b0'; vMult=1.2; hp=6; type='tank'; }

                // 난이도 계수 적용
                hp = Math.floor(hp * difficultyMultiplier);
                vMult = vMult * (1 + (difficultyMultiplier - 1) * 0.5);

                let x, y;
                if (Math.random() < 0.5) { x = Math.random() < 0.5 ? -r : canvas.width + r; y = Math.random() * canvas.height; } 
                else { x = Math.random() * canvas.width; y = Math.random() < 0.5 ? -r : canvas.height + r; }

                const angle = Math.atan2(player.y - y, player.x - x);
                const velocity = { x: Math.cos(angle) * vMult, y: Math.sin(angle) * vMult };

                enemies.push(new Enemy(x, y, r, c, velocity, hp, type));
            }, Math.max(400, 1000 - (difficultyMultiplier * 100))); // 난이도 오를수록 더 빨리 나옴
        }

        // --- 트윈 조이스틱 컨트롤 ---
        function setupJoystick(zoneId, knobId, callback) {
            const zone = document.getElementById(zoneId);
            const knob = document.getElementById(knobId);
            let active = false; let center = {x:0, y:0}; const maxR = 40;

            zone.addEventListener('touchstart', (e) => {
                e.preventDefault(); active = true;
                const rect = zone.getBoundingClientRect();
                center = { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
                moveKnob(e.changedTouches[0]);
            });
            zone.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if(active) {
                    for(let i=0; i<e.changedTouches.length; i++) {
                        moveKnob(e.changedTouches[i]);
                    }
                }
            });
            zone.addEventListener('touchend', (e) => {
                e.preventDefault(); active = false;
                knob.style.transform = `translate(-50%, -50%)`;
                callback({x:0, y:0}, false);
            });

            function moveKnob(touch) {
                // 터치 위치가 현재 존과 가까운지 대략적 확인
                const rect = zone.getBoundingClientRect();
                if(touch.clientX < rect.left - 50 || touch.clientX > rect.right + 50) return;

                let dx = touch.clientX - center.x; let dy = touch.clientY - center.y;
                let dist = Math.hypot(dx, dy);
                if (dist > maxR) { dx = (dx/dist)*maxR; dy = (dy/dist)*maxR; }
                knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                callback({ x: dx/maxR, y: dy/maxR }, true);
            }
        }

        let leftVector = {x:0, y:0}; let isLeftActive = false;
        let rightVector = {x:0, y:0}; let isRightActive = false;

        setupJoystick('joystick-left', 'knob-left', (v, a) => { leftVector = v; isLeftActive = a; });
        setupJoystick('joystick-right', 'knob-right', (v, a) => { rightVector = v; isRightActive = a; });

        // PC 조작 (WASD + 마우스)
        const keys = { w: false, a: false, s: false, d: false };
        let isMouseDown = false; let mouseAngle = 0;
        
        window.addEventListener('keydown', (e) => { if(e.key.toLowerCase() === 'r') reload(); keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });
        window.addEventListener('mousedown', () => isMouseDown = true);
        window.addEventListener('mouseup', () => isMouseDown = false);
        window.addEventListener('mousemove', (e) => { mouseAngle = Math.atan2(e.clientY - player.y, e.clientX - player.x); });

        function updateHealth() {
            let hpText = "HP: "; for(let i=0; i<player.health; i++) hpText += "❤️";
            document.getElementById('healthDisplay').innerText = hpText;
            if (player.health <= 0) {
                gameActive = false;
                document.getElementById('gameOverModal').style.display = 'flex';
                document.getElementById('finalScore').innerText = `최종 처치 수: ${score}`;
            }
        }

        // --- 메인 게임 루프 ---
        function animate() {
            requestAnimationFrame(animate);
            if (!gameActive || isPaused) return;

            // 배경 잔상 효과
            ctx.fillStyle = 'rgba(5, 5, 8, 0.5)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 1. 이동 처리 (키보드 or 왼쪽 조이스틱)
            let moveX = 0, moveY = 0;
            if (keys.a) moveX -= 1; if (keys.d) moveX += 1;
            if (keys.w) moveY -= 1; if (keys.s) moveY += 1;
            if (isLeftActive) { moveX = leftVector.x; moveY = leftVector.y; }

            if (player.x + moveX * player.speed > 20 && player.x + moveX * player.speed < canvas.width - 20) player.x += moveX * player.speed;
            if (player.y + moveY * player.speed > 20 && player.y + moveY * player.speed < canvas.height - 20) player.y += moveY * player.speed;

            player.draw();

            // 2. 공격 처리 (오른쪽 조이스틱 연사 or 마우스 클릭 연사)
            if (isRightActive && Math.hypot(rightVector.x, rightVector.y) > 0.2) {
                shoot(Math.atan2(rightVector.y, rightVector.x));
            } else if (isMouseDown) {
                shoot(mouseAngle);
            }

            // 3. 투사체 업데이트
            projectiles.forEach((p, index) => {
                p.update();
                if (p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height) projectiles.splice(index, 1);
            });

            // 4. 적 업데이트 및 충돌
            enemies.forEach((enemy, enemyIndex) => {
                enemy.update();

                // 적 vs 플레이어
                if (Math.hypot(player.x - enemy.x, player.y - enemy.y) - enemy.radius - player.radius < 1) {
                    enemies.splice(enemyIndex, 1);
                    player.health -= enemy.isBoss ? 2 : 1; // 보스한테 맞으면 2칸 깎임
                    updateHealth();
                    ctx.fillStyle = 'rgba(255, 0, 85, 0.4)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                }

                // 적 vs 총알
                projectiles.forEach((p, pIndex) => {
                    if (Math.hypot(p.x - enemy.x, p.y - enemy.y) - enemy.radius - p.radius < 1) {
                        projectiles.splice(pIndex, 1);
                        enemy.health -= p.damage;

                        if (enemy.health <= 0) {
                            enemies.splice(enemyIndex, 1);
                            score += enemy.isBoss ? 5 : 1; // 보스 잡으면 5킬 인정
                            document.getElementById('scoreDisplay').innerText = `처치: ${score}`;

                            // 10킬 업그레이드 (보스 등장 턴과 안 겹치게)
                            if (score % 10 === 0 && score !== lastUpgradeScore && score % 30 !== 0) {
                                lastUpgradeScore = score;
                                setTimeout(triggerUpgrade, 100);
                            }
                            // 30킬 보스 등장
                            if (score >= lastBossScore + 30) {
                                lastBossScore = score;
                                lastUpgradeScore = score; // 보스 뜰 땐 업글 스킵
                                spawnBoss();
                            }
                        }
                    }
                });
            });
        }

        // --- 게임 시작 함수 ---
        function startGame() {
            document.getElementById('introScreen').style.display = 'none';
            gameActive = true;
            spawnEnemies();
            animate();
        }

        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
    </script>
</body>
</html>
