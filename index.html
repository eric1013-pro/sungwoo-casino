<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💎 트릭이파크 VVIP 라운지 💎</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            text-align: center;
            margin: 0;
            padding: 50px 20px;
        }
        h1 {
            color: #ffd700;
            font-size: 2.5rem;
            text-shadow: 0 0 20px #daa520;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 40px;
        }
        .casino-box {
            background: #1a1a1a;
            border: 3px solid #ffd700;
            border-radius: 15px;
            padding: 30px;
            max-width: 400px;
            margin: 0 auto;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
        }
        .balance-box {
            background: #333;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.2rem;
            margin-bottom: 20px;
            border: 1px solid #555;
        }
        #money {
            color: #00ff00;
            font-weight: bold;
            font-size: 1.5rem;
        }
        .slot-machine {
            font-size: 4rem;
            letter-spacing: 10px;
            background: #000;
            padding: 20px;
            border-radius: 10px;
            border: inset 5px #555;
            margin-bottom: 25px;
            user-select: none;
        }
        .btn-spin {
            background: linear-gradient(to bottom, #ff416c, #ff4b2b);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 6px #8b0000;
            transition: 0.1s;
        }
        .btn-spin:active {
            transform: translateY(6px);
            box-shadow: 0 0px #8b0000;
        }
        .btn-spin:disabled {
            background: #555;
            box-shadow: none;
            cursor: not-allowed;
        }
        .message {
            margin-top: 25px;
            font-size: 1.1rem;
            color: #ffcc00;
            min-height: 50px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>💎 트릭이파크 VVIP 라운지 💎</h1>
    <p class="subtitle">※ 본 카지노의 화폐(TIC)는 휴지 조각보다 가치가 없습니다.</p>

    <div class="casino-box">
        <div class="balance-box">
            보유 자산<br>
            <span id="money">1,000,000</span> <span style="font-size: 1rem; color: #aaa;">태인코인(TIC)</span>
        </div>

        <div class="slot-machine" id="slots">🎰🎰🎰</div>

        <button class="btn-spin" onclick="pullLever()" id="spinBtn">전재산 몰빵하기</button>
        
        <div class="message" id="msg">호갱님, 어서 오세요.<br>버튼을 눌러 나락으로 가보세요.</div>
    </div>

    <script>
        let balance = 1000000;
        const items = ['💎', '🍒', '💩', '🤡'];
        const slotsDiv = document.getElementById('slots');
        const msgDiv = document.getElementById('msg');
        const moneySpan = document.getElementById('money');
        const spinBtn = document.getElementById('spinBtn');

        function pullLever() {
            if(balance <= 0) {
                msgDiv.innerHTML = "❌ <b>파산했습니다!</b><br>당장 나영준한테 가서 돈 좀 빌려오세요.";
                spinBtn.innerText = "돈이 없습니다";
                return;
            }

            spinBtn.disabled = true;
            balance -= 100000; // 1회에 10만 코인 차감
            moneySpan.innerText = balance.toLocaleString();
            msgDiv.innerText = "돌아가는 중...";

            // 슬롯머신 돌아가는 연출 (짧게 10번 깜빡임)
            let count = 0;
            const spinInterval = setInterval(() => {
                slotsDiv.innerText = 
                    items[Math.floor(Math.random()*items.length)] + 
                    items[Math.floor(Math.random()*items.length)] + 
                    items[Math.floor(Math.random()*items.length)];
                count++;

                if(count >= 15) {
                    clearInterval(spinInterval);
                    checkResult();
                }
            }, 50);
        }

        function checkResult() {
            spinBtn.disabled = false;
            
            // 최종 결과 확정
            const s1 = items[Math.floor(Math.random()*items.length)];
            const s2 = items[Math.floor(Math.random()*items.length)];
            const s3 = items[Math.floor(Math.random()*items.length)];
            
            slotsDiv.innerText = s1 + s2 + s3;

            // 판정 로직
            if (s1 === s2 && s2 === s3) {
                if (s1 === '💩') {
                    msgDiv.innerHTML = "🎉 <b>잭팟!!!</b><br>...인데 똥이네요! 상금은 0원입니다!";
                } else if (s1 === '🤡') {
                    msgDiv.innerHTML = "🤡 <b>광대 당첨!</b><br>유찬님 얼굴이랑 똑같네요. 상금 없습니다.";
                } else {
                    balance += 1000000;
                    msgDiv.innerHTML = "💰 <b>대박!! 100만 코인 획득!!</b><br>근데 어차피 가짜 돈이라 못 씁니다.";
                }
            } else {
                msgDiv.innerHTML = "💸 <b>꽝!</b><br>아깝네요. (사실 안 아까움) 계속 돌려보세요.";
            }
            
            moneySpan.innerText = balance.toLocaleString();
        }
    </script>
</body>
</html>
